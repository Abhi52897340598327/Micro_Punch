<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Stream</title>
    <link rel="stylesheet" href="style.css">
</head>

<!--No AI BTW-->

<body>
    <h1 class="h1">
        Micro Punch Dashboard
    </h1>
    <div class="main-container fix">
        <div class="telemetry fix">
            <div class="indicator fix">
               <div class="indicator-text fix">
                Detected
               </div>
            </div>
            <div class="statistic fix">
                <div class="number fix">
                    Loading...
                </div>
                <p class="stat-text fix">Islets detected</p>
            </div>
            <button class="refresh-button fix">Refresh</button>
            <div class="model-dropdown fix">
                <label for="model-select" class="label fix">Select Model</label>
                <select name="model-select" class="model-selector fix" id="model-select">
                    <option value="model1">Model 1</option>
                    <option value="model2">Model 2</option>
                    <option value="model3">Model 3</option>
                </select>
                <button class="select-button fix">Apply Model</button>
            </div>
            <button class="focus-button fix">Focus</button>
        </div>
        <div class="vid-container fix">
            Camera Stream
        </div>
    </div>
</body>

</html>
